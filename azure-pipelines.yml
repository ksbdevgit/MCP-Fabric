trigger:
  branches:
    include:
      - main

variables:
  azureServiceConnection: 'MCP-Fabric-Azure'
  resourceGroup: 'rg-FabricMCP-prod-001'
  appName: 'app-FabricMCP-front-prod-001'
  pythonVersion: '3.11'
  agentPoolName: 'DevOps_Agent'

stages:
  - stage: Build
    displayName: 'Build deploy package'
    jobs:
      - job: Build
        displayName: 'Package source'
        pool:
          name: $(agentPoolName)
        steps:
          - checkout: self
            displayName: 'Checkout source'

          - task: UsePythonVersion@0
            displayName: 'Use Python $(pythonVersion)'
            inputs:
              versionSpec: '$(pythonVersion)'
              addToPath: true

          - task: CopyFiles@2
            displayName: 'Stage app files'
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)'
              Contents: |
                fabric_rti_mcp/**
                scripts/**
                app.py
                startup.sh
                requirements.txt
                pyproject.toml
                .python-version
                .gitignore
              TargetFolder: '$(Build.ArtifactStagingDirectory)/site'

          - task: DeleteFiles@1
            displayName: 'Clean __pycache__ and *.pyc'
            inputs:
              SourceFolder: '$(Build.ArtifactStagingDirectory)/site'
              Contents: |
                **/__pycache__
                **/*.pyc

          - task: PowerShell@2
            displayName: 'Normalize shell scripts to LF'
            inputs:
              targetType: inline
              script: |
                Get-ChildItem -Path "$(Build.ArtifactStagingDirectory)/site" -Filter *.sh -Recurse | ForEach-Object {
                  $c = [IO.File]::ReadAllText($_.FullName) -replace "`r`n","`n" -replace "`r","`n"
                  [IO.File]::WriteAllText($_.FullName, $c)
                  Write-Host "Normalized $($_.FullName)"
                }

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt --target="$(Build.ArtifactStagingDirectory)/site/.python_packages/lib/site-packages"
            displayName: 'Install dependencies (Oryx-compatible layout)'

          - task: ArchiveFiles@2
            displayName: 'Zip deploy package'
            inputs:
              rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/site'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/deploy.zip'
              replaceExistingArchive: true

          - publish: '$(Build.ArtifactStagingDirectory)/deploy.zip'
            artifact: drop
            displayName: 'Publish artifact'

  - stage: Deploy
    displayName: 'Deploy to Azure App Service'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployWeb
        displayName: 'Deploy to $(appName)'
        environment: 'MCP-Fabric-prod'
        pool:
          name: $(agentPoolName)
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: drop

                - task: AzureWebApp@1
                  displayName: 'Deploy zip to App Service'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    appType: 'webAppLinux'
                    appName: $(appName)
                    resourceGroupName: $(resourceGroup)
                    package: '$(Pipeline.Workspace)/drop/deploy.zip'
                    startUpCommand: 'bash startup.sh'
                    deploymentMethod: 'zipDeploy'
